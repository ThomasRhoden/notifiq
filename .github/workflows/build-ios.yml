name: Build iOS
on:  
  push:    
    branches:      
      - main      
      - master  
  workflow_dispatch:

jobs:  
  build:    
    runs-on: macos-latest        
    steps:      
      - uses: actions/checkout@v4            
      
      - name: Setup Flutter        
        uses: subosito/flutter-action@v2        
        with:          
          flutter-version: 'latest'                
      
      - name: Get Flutter info        
        run: flutter --version              
      
      - name: Get dependencies        
        run: flutter pub get              
      
      - name: Build iOS        
        run: flutter build ios --release --no-codesign              
      
      - name: Create iOS App archive        
        run: |          
          cd build/ios/iphoneos          
          mkdir -p Payload          
          mv Runner.app Payload/          
          zip -r -y ../Runner.ipa Payload/Runner.app          
          cd ../          
          mv Runner.ipa ../../../              
      
      # Versão atualizada para v4 para resolver o erro
      - name: Upload iOS IPA        
        uses: actions/upload-artifact@v4        
        with:          
          name: ios-ipa          
          # Nota: O path foi mantido de acordo com o seu original. 
          # Verifique se o script acima coloca o arquivo .ipa no lugar certo.
          path: build/ios/Runner.ipa          
          retention-days: 30                
      
      # Substituído action descontinuada por uma moderna e funcional
      - name: Upload Release        
        uses: softprops/action-gh-release@v2      
        if: startsWith(github.ref, 'refs/tags/')        
        env:          
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
        with:          
          tag_name: ${{ github.ref }}          
          name: Release ${{ github.ref }}          
          draft: false          
          prerelease: false